            <h1 id="titulo-reclamaçao">Envie suas reclamações aqui:</h1>

            <form id="form-reclamacao">
                <br>

                <fieldset>

                    <input id="nome-rec" type="text" maxlength="50" size="50" required>

                    <label for="input_rec">Digite sua reclamação</label>
                    <textarea id="input_rec" name="input_rec" maxlength="500" rows="4" cols="50" required></textarea>

                    <button style="border-radius: 20px;" type="submit">Enviar</button>

                    <br><br>

                </fieldset>
            </form>
